<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAIWAN 1980 复刻版 - GitHub Pages</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --board-color: #2e7d32;
            --text-color: #00ff41; /* 復古電腦綠 */
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 10px; text-shadow: 0 0 5px var(--text-color); }
        #info { margin-bottom: 15px; font-size: 1.2rem; }
        
        /* 棋盤樣式 */
        #board {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(8, 50px);
            gap: 2px;
            background-color: #111;
            padding: 5px;
            border: 4px solid #555;
        }
        .cell {
            width: 50px;
            height: 50px;
            background-color: var(--board-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .cell:hover { background-color: #388e3c; }
        
        /* 棋子樣式 */
        .piece {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: none;
        }
        .black { background-color: #000; display: block; box-shadow: 2px 2px 4px rgba(0,0,0,0.4); }
        .white { background-color: #fff; display: block; box-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            cursor: pointer;
            font-family: inherit;
        }
        button:hover { background: var(--text-color); color: #000; }
    </style>
</head>
<body>

    <h1>TAIWAN.ASM REBORN</h1>
    <div id="info">輪到：黑棋 (Player 1)</div>
    
    <div id="board"></div>

    <button onclick="resetGame()">RESET GAME</button>

    <script>
        // 模擬 ASM 中的棋盤狀態 DATA_141E
        let board = Array(8).fill().map(() => Array(8).fill(0));
        let currentPlayer = 1; // 1: 黑, 2: 白
        let gameOver = false;

        const boardEl = document.getElementById('board');
        const infoEl = document.getElementById('info');

        // 初始化棋盤
        function createBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.onclick = () => handleMove(r, c);
                    
                    const piece = document.createElement('div');
                    piece.id = `pc-${r}-${c}`;
                    piece.className = 'piece';
                    
                    cell.appendChild(piece);
                    boardEl.appendChild(cell);
                }
            }
            updateDisplay();
        }

        function handleMove(r, c) {
            if (gameOver || board[r][c] !== 0) return;

            // 放置棋子 (對應 ASM 中的下子邏輯)
            board[r][c] = currentPlayer;
            
            if (checkWin(r, c)) {
                updateDisplay();
                infoEl.innerText = `WINNER: PLAYER ${currentPlayer === 1 ? 'BLACK' : 'WHITE'}!`;
                gameOver = true;
                return;
            }

            currentPlayer = 3 - currentPlayer; // 切換玩家
            updateDisplay();
        }

        // 核心邏輯：勝負判定 (模擬 ASM SUB_192 邏輯)
        function checkWin(r, c) {
            const directions = [
                [0, 1], [1, 0], [1, 1], [1, -1]
            ];
            for (let [dr, dc] of directions) {
                let count = 1;
                // 正向
                count += countDirection(r, c, dr, dc);
                // 反向
                count += countDirection(r, c, -dr, -dc);
                
                if (count >= 5) return true; // 假設為五子連珠規則
            }
            return false;
        }

        function countDirection(r, c, dr, dc) {
            let count = 0;
            let nr = r + dr;
            let nc = c + dc;
            while (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && board[nr][nc] === currentPlayer) {
                count++;
                nr += dr;
                nc += dc;
            }
            return count;
        }

        function updateDisplay() {
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = document.getElementById(`pc-${r}-${c}`);
                    piece.className = 'piece';
                    if (board[r][c] === 1) piece.classList.add('black');
                    if (board[r][c] === 2) piece.classList.add('white');
                }
            }
            if (!gameOver) {
                infoEl.innerText = `輪到：${currentPlayer === 1 ? '黑棋' : '白棋'}`;
            }
        }

        function resetGame() {
            board = Array(8).fill().map(() => Array(8).fill(0));
            currentPlayer = 1;
            gameOver = false;
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
